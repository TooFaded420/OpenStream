name: "OpenClaw Stream Deck"
version: "1.0.0"
slug: openclaw_streamdeck
description: "Control OpenClaw AI from Stream Deck via Home Assistant"
url: "https://github.com/openclaw/openclaw"
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
init: false
host_network: true
homeassistant: "2023.1.0"
map:
  - config:rw
options:
  gateway_url: "http://127.0.0.1:18790"
  device_token: ""
  auto_import: true
schema:
  gateway_url: str
  device_token: str
  auto_import: bool
panel_icon: mdi:gamepad-variant
panel_title: OpenClaw
panel_admin: false
ingress: true
ingress_port: 8099
ports:
  8099/tcp: 8099