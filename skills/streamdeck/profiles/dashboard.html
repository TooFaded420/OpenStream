<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenClaw Workspace Profiles</title>
  <style>
    :root {
      --bg: #070b08;
      --panel: #0d1511;
      --line: #294636;
      --primary: #8aff7a;
      --dim: #4fa95a;
      --alert: #ff6b57;
      --accent: #ff5a4f;
      --text: #d5ffd2;
      --muted: #83aa86;
      --dev: #8aff7a;
      --content: #ff9f7a;
      --ops: #82b1ff;
    }
    
    * { box-sizing: border-box; }
    
    body {
      margin: 0;
      font-family: 'Consolas', 'Monaco', monospace;
      background: radial-gradient(circle at top, var(--panel) 0%, var(--bg) 45%);
      color: var(--text);
      min-height: 100vh;
      padding: 20px;
    }
    
    .container {
      max-width: 1000px;
      margin: 0 auto;
    }
    
    header {
      text-align: center;
      margin-bottom: 30px;
    }
    
    h1 {
      margin: 0;
      color: var(--primary);
      font-size: 28px;
      text-shadow: 0 0 20px rgba(138, 255, 122, 0.3);
    }
    
    .subtitle {
      color: var(--muted);
      font-size: 14px;
      margin-top: 8px;
    }
    
    .profiles-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }
    
    .profile-card {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 24px;
      background: rgba(0, 0, 0, 0.2);
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }
    
    .profile-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: var(--border-color);
      opacity: 0;
      transition: opacity 0.3s;
    }
    
    .profile-card:hover {
      border-color: var(--border-color);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
    }
    
    .profile-card:hover::before {
      opacity: 1;
    }
    
    .profile-card.active {
      border-color: var(--border-color);
      background: rgba(138, 255, 122, 0.05);
    }
    
    .profile-card.active::before {
      opacity: 1;
    }
    
    .profile-card[data-profile="dev"] { --border-color: var(--dev); }
    .profile-card[data-profile="content"] { --border-color: var(--content); }
    .profile-card[data-profile="ops"] { --border-color: var(--ops); }
    
    .profile-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }
    
    .profile-icon {
      font-size: 32px;
      filter: drop-shadow(0 0 8px var(--border-color));
    }
    
    .profile-name {
      font-size: 20px;
      font-weight: bold;
      color: var(--border-color);
    }
    
    .profile-desc {
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 16px;
    }
    
    .profile-meta {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    
    .meta-tag {
      background: rgba(0, 0, 0, 0.3);
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 11px;
      color: var(--muted);
      border: 1px solid var(--line);
    }
    
    .meta-tag.active-indicator {
      background: var(--border-color);
      color: var(--bg);
      border-color: var(--border-color);
    }
    
    .presets-panel {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 20px;
      background: rgba(0, 0, 0, 0.2);
    }
    
    .panel-title {
      color: var(--primary);
      font-size: 14px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .presets-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 12px;
    }
    
    .preset-item {
      display: flex;
      justify-content: space-between;
      padding: 10px 14px;
      background: rgba(0, 0, 0, 0.15);
      border-radius: 8px;
      border: 1px solid var(--line);
    }
    
    .preset-label {
      color: var(--muted);
      font-size: 11px;
    }
    
    .preset-value {
      color: var(--text);
      font-size: 12px;
      font-weight: bold;
    }
    
    .controls {
      display: flex;
      gap: 12px;
      margin-top: 24px;
      flex-wrap: wrap;
    }
    
    button {
      padding: 12px 24px;
      border: 1px solid var(--line);
      background: rgba(0, 0, 0, 0.2);
      color: var(--text);
      border-radius: 8px;
      cursor: pointer;
      font-family: inherit;
      font-size: 13px;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    button:hover {
      border-color: var(--primary);
      background: rgba(138, 255, 122, 0.1);
    }
    
    button.primary {
      background: var(--primary);
      color: var(--bg);
      border-color: var(--primary);
    }
    
    button.primary:hover {
      background: #9aff8a;
      box-shadow: 0 0 20px rgba(138, 255, 122, 0.3);
    }
    
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    
    .status-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 24px;
      padding: 12px 16px;
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid var(--line);
      border-radius: 8px;
      font-size: 12px;
    }
    
    .status-indicator {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--dim);
      animation: pulse 2s infinite;
    }
    
    .status-dot.connected {
      background: var(--primary);
    }
    
    .status-dot.error {
      background: var(--alert);
      animation: none;
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      padding: 16px 20px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--text);
      transform: translateY(100px);
      opacity: 0;
      transition: all 0.3s;
      z-index: 1000;
    }
    
    .toast.show {
      transform: translateY(0);
      opacity: 1;
    }
    
    .toast.success {
      border-color: var(--primary);
    }
    
    .toast.error {
      border-color: var(--alert);
    }
    
    .quick-actions {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-top: 16px;
    }
    
    .quick-btn {
      padding: 16px;
      text-align: center;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(0, 0, 0, 0.15);
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .quick-btn:hover {
      border-color: var(--primary);
      background: rgba(138, 255, 122, 0.05);
    }
    
    .quick-btn .icon {
      font-size: 24px;
      display: block;
      margin-bottom: 8px;
    }
    
    .quick-btn .label {
      font-size: 11px;
      color: var(--muted);
    }

    @media (max-width: 768px) {
      .profiles-grid {
        grid-template-columns: 1fr;
      }
      .quick-actions {
        grid-template-columns: repeat(2, 1fr);
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🦞 OPENCLAW WORKSPACE PROFILES</h1>
      <div class="subtitle">v1.1 Command Center | Switch modes to update presets automatically</div>
    </header>

    <div class="profiles-grid" id="profilesGrid">
      <!-- Profiles will be populated by JS -->
    </div>

    <div class="presets-panel">
      <div class="panel-title">
        <span>⚡</span>
        <span>CURRENT PRESETS</span>
      </div>
      <div class="presets-grid" id="presetsGrid">
        <!-- Presets will be populated by JS -->
      </div>
    </div>

    <div class="presets-panel" style="margin-top: 20px;">
      <div class="panel-title">
        <span>🎮</span>
        <span>QUICK ACTIONS</span>
      </div>
      <div class="quick-actions" id="quickActions">
        <div class="quick-btn" onclick="spawnAgent()">
          <span class="icon">🤖</span>
          <span class="label">Spawn Agent</span>
        </div>
        <div class="quick-btn" onclick="checkStatus()">
          <span class="icon">📊</span>
          <span class="label">Status</span>
        </div>
        <div class="quick-btn" onclick="toggleTTS()">
          <span class="icon">🔊</span>
          <span class="label">TTS Toggle</span>
        </div>
        <div class="quick-btn" onclick="openWizard()">
          <span class="icon">🔧</span>
          <span class="label">Setup Wizard</span>
        </div>
      </div>
    </div>

    <div class="controls">
      <button class="primary" onclick="cycleProfile('next')">
        <span>→</span> Next Profile
      </button>
      <button onclick="cycleProfile('prev')">
        <span>←</span> Previous
      </button>
      <button onclick="refreshStatus()">
        <span>↻</span> Refresh
      </button>
      <button onclick="openConfig()">
        <span>⚙️</span> Edit Config
      </button>
    </div>

    <div class="status-bar">
      <div class="status-indicator">
        <span class="status-dot" id="statusDot"></span>
        <span id="statusText">Connecting to OpenClaw...</span>
      </div>
      <span id="versionText">v1.1.0</span>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    // Configuration
    const API_BASE = 'http://127.0.0.1:18790';
    
    // Profile definitions
    const PROFILES = {
      dev: {
        name: 'Developer',
        description: 'Coding, debugging, and software development',
        icon: '💻',
        color: '#8aff7a',
        presets: {
          model: 'synthetic/hf:nvidia/Kimi-K2.5-NVFP4',
          search: 'brave',
          task: 'code review',
          tts: false,
          timeout: '15s'
        }
      },
      content: {
        name: 'Content Creator',
        description: 'Writing, media creation, and content production',
        icon: '🎨',
        color: '#ff9f7a',
        presets: {
          model: 'synthetic/vertex/gemini-2.5-pro',
          search: 'brave',
          task: 'content ideas',
          tts: true,
          timeout: '20s'
        }
      },
      ops: {
        name: 'Operations',
        description: 'System monitoring, automation, and infrastructure',
        icon: '⚙️',
        color: '#82b1ff',
        presets: {
          model: 'synthetic/hf:nvidia/Kimi-K2.5-NVFP4',
          search: 'brave',
          task: 'system status',
          tts: false,
          timeout: '10s'
        }
      }
    };

    let currentProfile = 'dev';
    let isConnected = false;

    // Initialize
    document.addEventListener('DOMContentLoaded', () => {
      renderProfiles();
      refreshStatus();
      setInterval(refreshStatus, 10000);
    });

    // Render profile cards
    function renderProfiles() {
      const grid = document.getElementById('profilesGrid');
      grid.innerHTML = Object.entries(PROFILES).map(([key, profile]) => `
        <div class="profile-card ${key === currentProfile ? 'active' : ''}" 
             data-profile="${key}"
             onclick="switchProfile('${key}')">
          <div class="profile-header">
            <span class="profile-icon">${profile.icon}</span>
            <span class="profile-name">${profile.name}</span>
          </div>
          <div class="profile-desc">${profile.description}</div>
          <div class="profile-meta">
            <span class="meta-tag ${key === currentProfile ? 'active-indicator' : ''}">
              ${key === currentProfile ? '● ACTIVE' : '○ Click to switch'}
            </span>
            <span class="meta-tag">${profile.presets.model.split('/').pop()}</span>
            <span class="meta-tag">${profile.presets.tts ? 'TTS ON' : 'TTS OFF'}</span>
          </div>
        </div>
      `).join('');

      renderPresets();
    }

    // Render current presets
    function renderPresets() {
      const profile = PROFILES[currentProfile];
      const grid = document.getElementById('presetsGrid');
      
      const presets = [
        { label: 'Model', value: profile.presets.model.split('/').pop() },
        { label: 'Search Provider', value: profile.presets.search },
        { label: 'Default Task', value: profile.presets.task },
        { label: 'TTS Enabled', value: profile.presets.tts ? 'Yes' : 'No' },
        { label: 'Timeout', value: profile.presets.timeout },
        { label: 'Profile', value: profile.name }
      ];

      grid.innerHTML = presets.map(p => `
        <div class="preset-item">
          <span class="preset-label">${p.label}</span>
          <span class="preset-value">${p.value}</span>
        </div>
      `).join('');
    }

    // Switch profile
    async function switchProfile(profileKey) {
      if (profileKey === currentProfile) return;

      showToast(`Switching to ${PROFILES[profileKey].name}...`);
      
      try {
        const response = await fetch(`${API_BASE}/profiles.switch`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ profile: profileKey })
        });

        if (response.ok) {
          currentProfile = profileKey;
          renderProfiles();
          showToast(`✓ Switched to ${PROFILES[profileKey].name}`, 'success');
        } else {
          const error = await response.text();
          showToast(`✗ Failed: ${error}`, 'error');
        }
      } catch (e) {
        // Fallback: just update UI if API not available
        currentProfile = profileKey;
        renderProfiles();
        showToast(`Switched to ${PROFILES[profileKey].name} (offline mode)`, 'success');
      }
    }

    // Cycle to next/previous profile
    async function cycleProfile(direction) {
      const keys = Object.keys(PROFILES);
      const currentIdx = keys.indexOf(currentProfile);
      const nextIdx = direction === 'next' 
        ? (currentIdx + 1) % keys.length 
        : (currentIdx - 1 + keys.length) % keys.length;
      await switchProfile(keys[nextIdx]);
    }

    // Refresh status
    async function refreshStatus() {
      const dot = document.getElementById('statusDot');
      const text = document.getElementById('statusText');
      
      try {
        const response = await fetch(`${API_BASE}/status`);
        if (response.ok) {
          isConnected = true;
          dot.className = 'status-dot connected';
          text.textContent = `Connected to OpenClaw | Profile: ${PROFILES[currentProfile].name}`;
        } else {
          throw new Error('Not OK');
        }
      } catch (e) {
        isConnected = false;
        dot.className = 'status-dot error';
        text.textContent = 'OpenClaw offline - changes will apply when reconnected';
      }
    }

    // Quick actions
    async function spawnAgent() {
      const task = PROFILES[currentProfile].presets.task;
      try {
        await fetch(`${API_BASE}/spawn`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ task, agentId: 'helper' })
        });
        showToast('Agent spawned', 'success');
      } catch (e) {
        showToast('Failed to spawn agent', 'error');
      }
    }

    async function checkStatus() {
      try {
        const res = await fetch(`${API_BASE}/status`);
        const data = await res.json();
        showToast(`Gateway: ${data.status || 'OK'}`, 'success');
      } catch (e) {
        showToast('Gateway offline', 'error');
      }
    }

    async function toggleTTS() {
      try {
        const get = await fetch(`${API_BASE}/config.get`);
        const data = await get.json();
        const enabled = data?.messages?.tts?.enabled;
        
        await fetch(`${API_BASE}/config.patch`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ path: 'messages.tts.enabled', value: !enabled })
        });
        showToast(`TTS ${!enabled ? 'enabled' : 'disabled'}`, 'success');
      } catch (e) {
        showToast('Failed to toggle TTS', 'error');
      }
    }

    function openWizard() {
      window.open('http://localhost:8787/wizard', '_blank');
    }

    function openConfig() {
      alert('Profile config: %USERPROFILE%\\.openclaw\\workspace-profiles.json');
    }

    // Toast notification
    function showToast(message, type = '') {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.className = `toast ${type}`;
      setTimeout(() => toast.classList.add('show'), 10);
      setTimeout(() => toast.classList.remove('show'), 3000);
    }
  </script>
</body>
</html>
