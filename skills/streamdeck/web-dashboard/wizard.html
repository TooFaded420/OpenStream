<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OpenClaw Gateway Wizard (Simple)</title>
  <style>
    body{font-family:Consolas,monospace;background:#0b0f12;color:#d7ffe0;margin:0}
    .wrap{max-width:980px;margin:20px auto;padding:16px}
    .card{border:1px solid #2b4c3c;background:#111a16;border-radius:10px;padding:14px;margin-bottom:12px}
    h1{margin:0 0 8px;color:#8aff7a}
    .muted{color:#8db69a;font-size:12px}
    button{padding:9px 12px;border:1px solid #2b4c3c;background:#0d1a14;color:#d7ffe0;border-radius:8px;cursor:pointer;margin-right:8px;margin-top:8px}
    textarea, input{width:100%;padding:10px;border-radius:8px;border:1px solid #2b4c3c;background:#0b120f;color:#d7ffe0}
    .row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    pre{white-space:pre-wrap;background:#0a120e;border:1px solid #2b4c3c;padding:10px;border-radius:8px}
  </style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <h1>Gateway Setup Wizard (Simple + Reliable)</h1>
    <div class="muted">Use Detect, then edit JSON directly, then Save. No fragile dynamic fields.</div>
  </div>

  <div class="card">
    <div class="row">
      <div>
        <label class="muted">Detect local ports (comma-separated)</label>
        <input id="ports" value="18790,18789,28790" />
      </div>
      <div>
        <label class="muted">Quick preset</label>
        <button id="presetBtn">Apply 2-port preset (18790 + 18789)</button>
      </div>
    </div>
    <button id="loadBtn">Load Config</button>
    <button id="detectBtn">Detect Local</button>
    <button id="testBtn">Test All</button>
    <button id="bestBtn">Apply Best Gateway</button>
    <button id="saveBtn">Save Config</button>
    <div class="muted">Config path: %USERPROFILE%\.openclaw\streamdeck-gateways.json</div>
  </div>

  <div class="card">
    <h3>Config JSON</h3>
    <textarea id="json" rows="18"></textarea>
  </div>

  <div class="card">
    <h3>Test Output</h3>
    <pre id="out">No tests yet.</pre>
  </div>
</div>

<script>
async function api(path, opts={}){
  const r = await fetch(path, {headers:{'content-type':'application/json'}, ...opts});
  const t = await r.text();
  try { return JSON.parse(t); } catch { return t; }
}
function setJson(obj){ document.getElementById('json').value = JSON.stringify(obj,null,2); }
function getJson(){ return JSON.parse(document.getElementById('json').value); }

async function load(){ const cfg = await api('/api/gateway-config'); setJson(cfg); }

document.getElementById('loadBtn').onclick = load;

document.getElementById('presetBtn').onclick = ()=>{
  setJson({
    active: 'origin-main',
    gateways: {
      'origin-main': { url: 'http://127.0.0.1:18790', token: null },
      'zero-mac': { url: 'http://127.0.0.1:18789', token: null }
    }
  });
};

document.getElementById('detectBtn').onclick = async ()=>{
  const ports = document.getElementById('ports').value.split(',').map(s=>s.trim()).filter(Boolean);
  const cfg = await api('/api/detect-local', { method:'POST', body: JSON.stringify({ports}) });
  setJson(cfg);
};

document.getElementById('saveBtn').onclick = async ()=>{
  try {
    const cfg = getJson();
    await api('/api/gateway-config', { method:'POST', body: JSON.stringify(cfg) });
    document.getElementById('out').textContent = 'Saved successfully.';
  } catch (e) {
    document.getElementById('out').textContent = 'Save failed: '+e.message;
  }
};

document.getElementById('testBtn').onclick = async ()=>{
  const out = await api('/api/test-gateways');
  const lines = [];
  for (const [k,v] of Object.entries(out||{})) {
    lines.push(`${k}: ${v.code}${v.latencyMs ? ` (${v.latencyMs}ms)` : ''}`);
  }
  document.getElementById('out').textContent = lines.join('\n') || 'No gateways';
};

document.getElementById('bestBtn').onclick = async ()=>{
  const res = await api('/api/apply-best-gateway', { method:'POST' });
  document.getElementById('out').textContent = res.ok
    ? `Active set to ${res.active} (${res.latencyMs}ms)`
    : `Failed: ${res.error || 'No healthy gateways'}`;
  await load();
};

load();
</script>
</body>
</html>
