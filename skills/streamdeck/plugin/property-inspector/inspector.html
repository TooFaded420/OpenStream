<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>OpenClaw Settings</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1d25;
            color: #e4e4e7;
            padding: 16px;
            font-size: 13px;
        }
        
        .sdpi-wrapper {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .sdpi-item {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        
        .sdpi-item-label {
            color: #71717a;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .sdpi-item-value {
            color: #ff5c5c;
            font-weight: 600;
        }
        
        input[type="text"] {
            background: #12141a;
            border: 1px solid #27272a;
            border-radius: 6px;
            padding: 8px 12px;
            color: #e4e4e7;
            font-size: 13px;
            width: 100%;
        }
        
        input[type="text"]:focus {
            outline: none;
            border-color: #ff5c5c;
        }
        
        .sdpi-info {
            background: #ff5c5c15;
            border: 1px solid #ff5c5c30;
            border-radius: 6px;
            padding: 10px 12px;
            font-size: 12px;
            color: #ff8a8a;
        }
        
        .sdpi-link {
            color: #ff5c5c;
            text-decoration: none;
        }
        
        .sdpi-link:hover {
            text-decoration: underline;
        }
        
        button {
            background: #ff5c5c;
            border: none;
            border-radius: 6px;
            padding: 8px 16px;
            color: white;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        button:hover {
            background: #ff7070;
        }
    </style>
</head>
<body>
    <div class="sdpi-wrapper">
        <div class="sdpi-info">
            <strong>OpenClaw Integration</strong><br>
            Control your AI assistant from Stream Deck
        </div>
        
        <div class="sdpi-item">
            <div class="sdpi-item-label">Action</div>
            <div class="sdpi-item-value" id="action-name">Loading...</div>
        </div>
        
        <div class="sdpi-item">
            <div class="sdpi-item-label">Gateway URL</div>
            <input type="text" id="gateway-url" value="http://127.0.0.1:18790" placeholder="http://127.0.0.1:18790">
        </div>
        
        <div class="sdpi-item">
            <div class="sdpi-item-label">Device Token (Optional)</div>
            <input type="text" id="device-token" value="" placeholder="Your OpenClaw device token">
        </div>
        
        <div class="sdpi-item">
            <button id="test-connection">Test Connection</button>
        </div>
        
        <div class="sdpi-info">
            Need help? Visit <a href="https://docs.openclaw.ai" class="sdpi-link" target="_blank">docs.openclaw.ai</a>
        </div>
    </div>

    <script>
        // Stream Deck integration
        if ($SD) {
            $SD.on('connected', (jsn) => {
                const settings = jsn.payload.settings;
                document.getElementById('gateway-url').value = settings.gatewayUrl || 'http://127.0.0.1:18790';
                document.getElementById('device-token').value = settings.deviceToken || '';
                document.getElementById('action-name').textContent = jsn.actionInfo?.action?.split('.').pop() || 'OpenClaw';
            });
            
            $SD.on('piDataChanged', (jsn) => {
                $SD.api.setSettings(jsn.context, {
                    gatewayUrl: document.getElementById('gateway-url').value,
                    deviceToken: document.getElementById('device-token').value
                });
            });
        }
        
        document.getElementById('test-connection').addEventListener('click', () => {
            const url = document.getElementById('gateway-url').value;
            fetch(url + '/status')
                .then(r => r.json())
                .then(() => alert('Connected!'))
                .catch(() => alert('Failed to connect. Is OpenClaw running?'));
        });
    </script>
</body>
</html>
